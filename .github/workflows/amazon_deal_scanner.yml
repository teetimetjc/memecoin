name: Amazon Deal Scanner

on:
  workflow_dispatch:         # triggered via API (cron-job.org) or manually from GitHub UI

jobs:
  scan-amazon-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install selenium beautifulsoup4 requests

      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run Amazon deal scanner
        run: python amazon_deal_scanner.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshot_*.png
          retention-days: 3
